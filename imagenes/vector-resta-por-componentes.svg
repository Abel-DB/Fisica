<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
  </marker>

  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
  </marker>

  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
  </marker>

  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
  </marker>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- TITULO -->
<text x="330" y="42" font-size="34" font-family="Arial" font-weight="bold" fill="#111">
Resta de Vectores por Componentes
</text>

<!-- ORIGEN -->
<circle cx="320" cy="560" r="5" fill="#111"/>

<!-- EJE X -->
<line x1="320" y1="560" x2="820" y2="560"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="840" y="568" font-size="30" fill="#111">x</text>

<!-- EJE Z -->
<line x1="320" y1="560" x2="320" y2="150"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="332" y="135" font-size="30" fill="#111">z</text>

<!-- EJE Y -->
<line x1="320" y1="560" x2="120" y2="700"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="95" y="722" font-size="30" fill="#111">y</text>

<!-- VECTOR A -->
<line x1="320" y1="560" x2="560" y2="330"
stroke="#dc2626" stroke-width="2"
marker-end="url(#arrowRed)"/>
<text x="455" y="420" font-size="30" fill="#dc2626">A</text>

<!-- VECTOR B -->
<line x1="320" y1="560" x2="500" y2="410"
stroke="#2563eb" stroke-width="2"
marker-end="url(#arrowBlue)"/>
<text x="410" y="505" font-size="30" fill="#2563eb">B</text>

<!-- RESULTANTE A-B -->
<line x1="320" y1="560" x2="250" y2="455"
stroke="#16a34a" stroke-width="2"
marker-end="url(#arrowGreen)"/>
<text x="170" y="430" font-size="28" fill="#16a34a">R = A - B</text>

<!-- GUÍAS -->
<line x1="250" y1="455" x2="250" y2="560"
stroke="#999" stroke-width="1.5" stroke-dasharray="6 6"/>

<!-- FORMULAS -->
<text x="870" y="210" font-size="24" fill="#dc2626">
A = 3î + 4ĵ + 8k̂
</text>

<text x="870" y="260" font-size="24" fill="#2563eb">
B = 5î + 2ĵ + 4.3k̂
</text>

<text x="870" y="340" font-size="24" fill="#111">
R = A - B
</text>

<text x="870" y="390" font-size="24" fill="#111">
R = (3-5)î + (4-2)ĵ + (8-4.3)k̂
</text>

<text x="870" y="450" font-size="24" fill="#16a34a">
R = -2î + 2ĵ + 3.7k̂
</text>

<!-- ETIQUETAS -->
<text x="870" y="560" font-size="24" fill="#dc2626">Rojo → Vector A</text>
<text x="870" y="600" font-size="24" fill="#2563eb">Azul → Vector B</text>
<text x="870" y="640" font-size="24" fill="#16a34a">Verde → Resultante</text>

</svg>
