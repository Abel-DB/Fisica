<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
  </marker>

  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
  </marker>

  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
  </marker>

  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
  </marker>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- TITULO -->
<text x="330" y="42" font-size="34" font-family="Arial" font-weight="bold" fill="#111">
Suma de Vectores por Componentes
</text>

<!-- Ejes -->
<circle cx="300" cy="560" r="5" fill="#111"/>

<line x1="300" y1="560" x2="820" y2="560"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="840" y="568" font-size="30" fill="#111">x</text>

<line x1="300" y1="560" x2="300" y2="150"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="312" y="135" font-size="30" fill="#111">z</text>

<line x1="300" y1="560" x2="120" y2="690"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="95" y="712" font-size="30" fill="#111">y</text>

<!-- VECTOR A -->
<line x1="300" y1="560" x2="560" y2="360"
stroke="#dc2626" stroke-width="2"
marker-end="url(#arrowRed)"/>
<text x="450" y="430" font-size="30" fill="#dc2626">A</text>

<!-- VECTOR B -->
<line x1="300" y1="560" x2="510" y2="410"
stroke="#2563eb" stroke-width="2"
marker-end="url(#arrowBlue)"/>
<text x="410" y="500" font-size="30" fill="#2563eb">B</text>

<!-- RESULTANTE -->
<line x1="300" y1="560" x2="720" y2="250"
stroke="#16a34a" stroke-width="2"
marker-end="url(#arrowGreen)"/>
<text x="560" y="360" font-size="30" fill="#16a34a">R = A + B</text>

<!-- Guías -->
<line x1="720" y1="250" x2="720" y2="560"
stroke="#999" stroke-width="1.5" stroke-dasharray="6 6"/>

<!-- FORMULAS -->
<text x="870" y="210" font-size="25" fill="#dc2626">
A = 6î + 5ĵ + 5k̂
</text>

<text x="870" y="260" font-size="25" fill="#2563eb">
B = 5î + 2ĵ + 4.3k̂
</text>

<text x="870" y="340" font-size="25" fill="#111">
R = A + B
</text>

<text x="870" y="390" font-size="25" fill="#111">
R = (6+5)î + (5+2)ĵ + (5+4.3)k̂
</text>

<text x="870" y="450" font-size="25" fill="#16a34a">
R = 11î + 7ĵ + 9.3k̂
</text>

<!-- Etiquetas -->
<text x="870" y="560" font-size="25" fill="#dc2626">Rojo → Vector A</text>
<text x="870" y="600" font-size="25" fill="#2563eb">Azul → Vector B</text>
<text x="870" y="640" font-size="25" fill="#16a34a">Verde → Resultante</text>

</svg>
