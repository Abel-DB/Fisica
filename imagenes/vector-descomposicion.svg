<svg width="1200" height="780" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
  </marker>

  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
  </marker>

  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
  </marker>

  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
  </marker>

  <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
  </marker>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- TITULO -->
<text x="250" y="42" font-size="34" font-family="Arial" font-weight="bold" fill="#111">
Descomposición de Vectores
</text>

<!-- ORIGEN -->
<circle cx="320" cy="560" r="5" fill="#111"/>

<!-- EJES -->
<line x1="320" y1="560" x2="780" y2="560"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="800" y="568" font-size="30">x</text>

<line x1="320" y1="560" x2="320" y2="150"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="332" y="135" font-size="30">z</text>

<line x1="320" y1="560" x2="120" y2="700"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="95" y="722" font-size="30">y</text>

<!-- VECTOR ORIGINAL -->
<line x1="320" y1="560" x2="620" y2="280"
stroke="#dc2626" stroke-width="3"
marker-end="url(#arrowRed)"/>
<text x="485" y="400" font-size="30" fill="#dc2626">A</text>

<!-- AX -->
<line x1="320" y1="560" x2="620" y2="560"
stroke="#2563eb" stroke-width="2"
marker-end="url(#arrowBlue)"/>
<text x="455" y="595" font-size="28" fill="#2563eb">Ax</text>

<!-- AZ -->
<line x1="620" y1="560" x2="620" y2="280"
stroke="#16a34a" stroke-width="2"
marker-end="url(#arrowGreen)"/>
<text x="635" y="430" font-size="28" fill="#16a34a">Az</text>

<!-- AY -->
<line x1="320" y1="560" x2="230" y2="625"
stroke="#7c3aed" stroke-width="2"
marker-end="url(#arrowPurple)"/>
<text x="220" y="575" font-size="28" fill="#7c3aed">Ay</text>

<!-- GUIAS -->
<line x1="620" y1="280" x2="620" y2="560"
stroke="#999" stroke-width="1.5"
stroke-dasharray="6 6"/>

<line x1="230" y1="625" x2="620" y2="625"
stroke="#999" stroke-width="1.5"
stroke-dasharray="6 6"/>

<!-- FORMULAS -->
<text x="860" y="220" font-size="26" fill="#111">
A = Axî + Ayĵ + Azk̂
</text>

<text x="860" y="300" font-size="24" fill="#111">
Ax → componente en x
</text>

<text x="860" y="340" font-size="24" fill="#111">
Ay → componente en y
</text>

<text x="860" y="380" font-size="24" fill="#111">
Az → componente en z
</text>

<!-- LEYENDA -->
<text x="860" y="520" font-size="24" fill="#dc2626">Rojo → Vector original</text>
<text x="860" y="560" font-size="24" fill="#2563eb">Azul → componente x</text>
<text x="860" y="600" font-size="24" fill="#7c3aed">Morado → componente y</text>
<text x="860" y="640" font-size="24" fill="#16a34a">Verde → componente z</text>

</svg>
