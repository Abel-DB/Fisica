<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Flechas negras -->
  <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
  </marker>

  <!-- Flechas colores -->
  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
  </marker>

  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
  </marker>

  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
  </marker>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- Título -->
<text x="335" y="42" font-size="34" font-family="Arial" font-weight="bold" fill="#111">
Vectores Unitarios
</text>

<!-- Fórmula -->
<text x="90" y="95" font-size="30" fill="#111">Ûa =</text>

<line x1="112" y1="72" x2="130" y2="72"
stroke="#111" stroke-width="0.5"
marker-end="url(#arrowBlack)"/>

<text x="195" y="78" font-size="30" fill="#111">a</text>
<line x1="197" y1="58" x2="215" y2="58"
stroke="#111" stroke-width="0.5"
marker-end="url(#arrowBlack)"/>

<line x1="185" y1="88" x2="245" y2="88"
stroke="#111" stroke-width="1.2"/>

<text x="198" y="118" font-size="30" fill="#111">|a|</text>
<line x1="216" y1="98" x2="232" y2="98"
stroke="#111" stroke-width="0.6"
marker-end="url(#arrowBlack)"/>

<!-- Texto izquierdo -->
<text x="90" y="170" font-size="24" fill="#111">î, ĵ, k̂ son unitarios</text>
<text x="90" y="210" font-size="24" fill="#dc2626">|î| = 1</text>
<text x="90" y="245" font-size="24" fill="#16a34a">|ĵ| = 1</text>
<text x="90" y="280" font-size="24" fill="#2563eb">|k̂| = 1</text>

<!-- Origen -->
<circle cx="610" cy="390" r="5" fill="#111"/>

<!-- Eje Z negro -->
<line x1="610" y1="390" x2="610" y2="140"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="625" y="128" font-size="32" fill="#111">z</text>

<!-- k azul -->
<line x1="610" y1="390" x2="610" y2="290"
stroke="#2563eb" stroke-width="2"
marker-end="url(#arrowBlue)"/>
<text x="630" y="325" font-size="28" fill="#2563eb">k̂</text>

<!-- Eje X negro -->
<line x1="610" y1="390" x2="950" y2="390"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="972" y="400" font-size="32" fill="#111">x</text>

<!-- i rojo -->
<line x1="610" y1="390" x2="735" y2="390"
stroke="#dc2626" stroke-width="2"
marker-end="url(#arrowRed)"/>
<text x="675" y="365" font-size="28" fill="#dc2626">î</text>

<!-- Eje Y negro -->
<line x1="610" y1="390" x2="390" y2="610"
stroke="#111" stroke-width="2"
marker-end="url(#arrowBlack)"/>
<text x="360" y="635" font-size="32" fill="#111">y</text>

<!-- j verde -->
<line x1="610" y1="390" x2="535" y2="465"
stroke="#16a34a" stroke-width="2"
marker-end="url(#arrowGreen)"/>
<text x="555" y="425" font-size="28" fill="#16a34a">ĵ</text>

<!-- Ángulo recto -->
<path d="M610 390 L645 390 L645 355 L610 355"
fill="none" stroke="#666" stroke-width="2"/>

<!-- Texto ángulos -->
<text x="720" y="250" font-size="24" fill="#444">∠(x,z) = 90°</text>
<text x="720" y="285" font-size="24" fill="#444">∠(x,y) = 90°</text>
<text x="720" y="320" font-size="24" fill="#444">∠(y,z) = 90°</text>

<!-- Etiquetas -->
<text x="720" y="520" font-size="24" fill="#dc2626">Eje x → vector unitario î</text>
<text x="720" y="555" font-size="24" fill="#16a34a">Eje y → vector unitario ĵ</text>
<text x="720" y="590" font-size="24" fill="#2563eb">Eje z → vector unitario k̂</text>

</svg>
