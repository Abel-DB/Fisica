<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
  </marker>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- Título -->
<text x="290" y="42" font-size="34" font-family="Arial" font-weight="bold">
Vectores Perpendiculares
</text>

<!-- Ejes -->
<line x1="150" y1="430" x2="980" y2="430" stroke="#999" stroke-width="2"/>
<line x1="250" y1="500" x2="250" y2="120" stroke="#999" stroke-width="2"/>

<!-- Vector A eje Y -->
<line x1="250" y1="430" x2="250" y2="170"
      stroke="#111" stroke-width="5"
      marker-end="url(#arrow)"/>

<!-- Etiqueta A -->
<text x="215" y="290" font-size="30" font-family="Arial">A</text>
<line x1="217" y1="265" x2="235" y2="265"
      stroke="#111" stroke-width="0.5"
      marker-end="url(#arrow)"/>

<!-- Vector B eje X -->
<line x1="250" y1="430" x2="650" y2="430"
      stroke="#111" stroke-width="5"
      marker-end="url(#arrow)"/>

<!-- Etiqueta B -->
<text x="440" y="468" font-size="30" font-family="Arial">B</text>
<line x1="442" y1="442" x2="460" y2="442"
      stroke="#111" stroke-width="0.5"
      marker-end="url(#arrow)"/>

<!-- Ángulo recto en cruce -->
<path d="M250 430 L295 430 L295 385 L250 385 Z"
      fill="none" stroke="#111" stroke-width="2"/>

<text x="305" y="410" font-size="26" fill="#dc2626" font-family="Arial">90°</text>

<!-- Relaciones -->
<text x="760" y="120" font-size="28" font-family="Arial">A</text>

<!-- Flecha arriba A -->
<line x1="760" y1="98" x2="778" y2="98"
      stroke="#111" stroke-width="0.5"
      marker-end="url(#arrow)"/>

<!-- Ángulo recto más pegado -->
<path d="M790 100 L790 120 L810 120"
      fill="none" stroke="#111" stroke-width="2"/>

<!-- B más pegado -->
<text x="820" y="120" font-size="28" font-family="Arial">B</text>

<!-- Flecha arriba B -->
<line x1="820" y1="98" x2="838" y2="98"
      stroke="#111" stroke-width="0.5"
      marker-end="url(#arrow)"/>

<text x="760" y="165" font-size="28" font-family="Arial">θ = 90°</text>

<text x="760" y="210" font-size="24" font-family="Arial">
Forman ángulo recto
</text>

</svg>
